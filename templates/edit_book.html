{% extends "base.html" %}
{% block title %}تعديل كتاب{% endblock %}
{% block content %}
<h2>تعديل: {{ book.title }}</h2>
<div class="card">
    <form method="post">
        <input type="text" name="title" value="{{ book.title }}" required>
        <input type="text" name="author" value="{{ book.author }}" required>
        <select name="category" required style="width:100%; padding:10px; margin:8px 0; background:#0f1115; border:1px solid #2a2d34; color:#fff; border-radius:6px;">
            {% for cat in categories %}
            <option value="{{ cat }}" {% if cat == book.category %}selected{% endif %}>{{ cat }}</option>
            {% endfor %}
        </select>
        <textarea name="description">{{ book.description or '' }}</textarea>
        <input type="number" name="copies" value="{{ book.copies_total }}" min="1" required>
        <button class="btn" type="submit">حفظ التعديلات</button>
    </form>
</div>
{% endblock %}
